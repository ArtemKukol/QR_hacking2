<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="./css/Norm_block_model.css" />
		<link rel="stylesheet" href="./css/style.css" />
		<title>QR ШК</title>
	</head>
	<body>
		<style>
			body {
				font-family: sans-serif;
				margin: 20px;
			}
			.app {
				max-width: 400px;
				margin: 0 auto;
				text-align: center;
			}
			#reader {
				width: 100%;
				margin-bottom: 16px;
			}
			#barcodeValue {
				margin-top: 8px;
				font-size: 14px;
				color: #333;
			}
			#zoomRange {
				width: 100%;
			}
		</style>

		<div class="app">
			<h2>QR → Штрихкод2</h2>

			<div id="reader"></div>

			<div style="margin: 8px 0">
				<label for="zoomRange">Зум:</label>
				<input
					id="zoomRange"
					type="range"
					min="1"
					max="3"
					step="0.1"
					value="1"
				/>
				<span id="zoomValue">1.0x</span>
			</div>

			<svg id="barcode"></svg>
			<div id="barcodeValue"></div>
		</div>

		<!-- Генератор штрихкода -->
		<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
		<!-- QR сканер (низкоуровневый Html5Qrcode, не Html5QrcodeScanner) -->
		<script src="https://unpkg.com/html5-qrcode@2.3.4/html5-qrcode.min.js"></script>

		<script>
			function extractBarcode(decodedText) {
				// ожидаем формат типа: CEN;4607056587934;129.99;1;6;19.02.26
				const parts = decodedText.split(';');
				if (parts.length > 1 && /^\d+$/.test(parts[1])) {
					return parts[1];
				}
				return null;
			}

			let html5QrCode = null;
			let videoTrack = null;

			async function startScanner() {
				const qrRegionId = 'reader';
				html5QrCode = new Html5Qrcode(qrRegionId);

				// Стартуем сканер с небольшой областью, чтобы «приблизить» код
				await html5QrCode.start(
					{ facingMode: 'environment' },
					{
						fps: 15,
						qrbox: { width: 180, height: 180 }, // меньше, чем 250, даёт больше «зум»
					},
					onScanSuccess,
					onScanError,
				);

				// Получаем доступ к видеотреку для управления зумом
				const stream = await navigator.mediaDevices.getUserMedia({
					video: { facingMode: 'environment' },
				});
				videoTrack = stream.getVideoTracks()[0];

				setupZoomControl();
			}

			function setupZoomControl() {
				const range = document.getElementById('zoomRange');
				const valueSpan = document.getElementById('zoomValue');

				if (!videoTrack || !videoTrack.getCapabilities) {
					range.disabled = true;
					valueSpan.textContent = 'нет зума';
					return;
				}

				const capabilities = videoTrack.getCapabilities();
				if (!capabilities.zoom) {
					range.disabled = true;
					valueSpan.textContent = 'нет зума';
					return;
				}

				// Настраиваем слайдер под реальные возможности камеры
				range.min = capabilities.zoom.min;
				range.max = capabilities.zoom.max;
				range.step = capabilities.zoom.step || 0.1;
				range.value = capabilities.zoom.min;
				valueSpan.textContent = capabilities.zoom.min.toFixed(1) + 'x';

				range.oninput = async () => {
					const zoomLevel = parseFloat(range.value);
					valueSpan.textContent = zoomLevel.toFixed(1) + 'x';
					try {
						await videoTrack.applyConstraints({
							advanced: [{ zoom: zoomLevel }],
						});
					} catch (e) {
						console.warn('Не удалось применить зум:', e);
					}
				};
			}

			function onScanSuccess(decodedText, decodedResult) {
				const barcodeNumber = extractBarcode(decodedText);

				if (!barcodeNumber) {
					console.warn('Не удалось вытащить штрихкод из строки:', decodedText);
					document.getElementById('barcodeValue').textContent =
						'Ошибка: не найден штрихкод в данных QR';
					return;
				}

				JsBarcode('#barcode', barcodeNumber, {
					format: 'CODE128',
					lineColor: '#000',
					width: 2,
					height: 80,
					displayValue: true,
				});

				document.getElementById('barcodeValue').textContent = barcodeNumber;

				// Если нужно — можно остановить сканер после первого успешного чтения:
				// html5QrCode.stop().then(() => html5QrCode.clear());
			}

			function onScanError(errorMessage) {
				// игнорируем «нет кода на кадре», остальные выводим
				if (
					!/No MultiFormat Readers were able to detect the code/.test(
						errorMessage,
					)
				) {
					console.warn(errorMessage);
				}
			}

			document.addEventListener('DOMContentLoaded', () => {
				startScanner().catch(console.error);
			});
		</script>
	</body>
</html>
