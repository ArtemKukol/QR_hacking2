<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="./css/Norm_block_model.css" />
		<link rel="stylesheet" href="./css/style.css" />
		<title>QR ШК</title>
		<style>
			body {
				font-family: sans-serif;
				margin: 20px;
			}
			.app {
				max-width: 400px;
				margin: 0 auto;
				text-align: center;
			}
			#reader {
				width: 100%;
				margin-bottom: 16px;
			}
			#barcodeValue {
				margin-top: 8px;
				font-size: 14px;
				color: #333;
				word-break: break-all;
			}
			#zoomRange {
				width: 100%;
			}
			.zoom-wrap {
				margin: 8px 0 16px;
			}
			.zoom-disabled {
				opacity: 0.6;
			}
		</style>
	</head>
	<body>
		<div class="app">
			<h2>QR → Штрихкод3</h2>

			<div id="reader"></div>

			<div class="zoom-wrap">
				<label for="zoomRange">Зум:</label>
				<input id="zoomRange" type="range" min="1" max="3" step="0.1" value="1" />
				<span id="zoomValue">1.0x</span>
			</div>

			<svg id="barcode"></svg>
			<div id="barcodeValue"></div>
		</div>

		<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
		<script src="https://unpkg.com/html5-qrcode@2.3.4/html5-qrcode.min.js"></script>

		<script>
			function extractBarcode(decodedText) {
				const parts = decodedText.split(';');
				if (parts.length > 1 && /^\d+$/.test(parts[1])) return parts[1];
				return null;
			}

			const zoomRange = document.getElementById('zoomRange');
			const zoomValue = document.getElementById('zoomValue');
			const zoomWrap = document.querySelector('.zoom-wrap');
			const barcodeValueEl = document.getElementById('barcodeValue');

			let html5QrCode = null;
			let currentZoom = 1;
			let scanningStarted = false;

			async function startScanner() {
				html5QrCode = new Html5Qrcode('reader');

				const cameras = await Html5Qrcode.getCameras();
				if (!cameras || !cameras.length) {
					zoomRange.disabled = true;
					zoomValue.textContent = 'нет камеры';
					zoomWrap.classList.add('zoom-disabled');
					throw new Error('Камеры не найдены');
				}

				const backCamera =
					cameras.find((c) =>
						/back|rear|environment/i.test(c.label || ''),
					) || cameras[cameras.length - 1];

				await html5QrCode.start(
					{ deviceId: { exact: backCamera.id } },
					{
						fps: 15,
						qrbox: { width: 180, height: 180 },
					},
					onScanSuccess,
					onScanError,
				);

				scanningStarted = true;

				setTimeout(async () => {
					await setupZoomControl();
				}, 800);
			}

			async function setupZoomControl() {
				try {
					if (!html5QrCode || !html5QrCode.applyVideoConstraints) {
						disableZoom('нет зума');
						return;
					}

					const cameras = await Html5Qrcode.getCameras();
					if (!cameras || !cameras.length) {
						disableZoom('нет зума');
						return;
					}

					const trackCapabilities = html5QrCode.getRunningTrackCapabilities
						? html5QrCode.getRunningTrackCapabilities()
						: null;

					if (!trackCapabilities || !trackCapabilities.zoom) {
						disableZoom('нет зума');
						return;
					}

					const min = trackCapabilities.zoom.min ?? 1;
					const max = trackCapabilities.zoom.max ?? 3;
					const step = trackCapabilities.zoom.step || 0.1;
					const initial =
						html5QrCode.getRunningTrackSettings &&
						html5QrCode.getRunningTrackSettings().zoom
							? html5QrCode.getRunningTrackSettings().zoom
							: min;

					zoomRange.min = min;
					zoomRange.max = max;
					zoomRange.step = step;
					zoomRange.value = initial;
					zoomValue.textContent = Number(initial).toFixed(1) + 'x';

					zoomRange.disabled = false;
					zoomWrap.classList.remove('zoom-disabled');

					zoomRange.oninput = async () => {
						const zoomLevel = parseFloat(zoomRange.value);
						zoomValue.textContent = zoomLevel.toFixed(1) + 'x';
						currentZoom = zoomLevel;

						try {
							await html5QrCode.applyVideoConstraints({
								advanced: [{ zoom: zoomLevel }],
							});
						} catch (e) {
							console.warn('Не удалось применить зум:', e);
						}
					};
				} catch (e) {
					console.warn(e);
					disableZoom('нет зума');
				}
			}

			function disableZoom(text) {
				zoomRange.disabled = true;
				zoomValue.textContent = text;
				zoomWrap.classList.add('zoom-disabled');
			}

			function onScanSuccess(decodedText) {
				const barcodeNumber = extractBarcode(decodedText);

				if (!barcodeNumber) {
					barcodeValueEl.textContent = 'Ошибка: не найден штрихкод в данных QR';
					return;
				}

				JsBarcode('#barcode', barcodeNumber, {
					format: 'CODE128',
					lineColor: '#000',
					width: 2,
					height: 80,
					displayValue: true,
				});

				barcodeValueEl.textContent = barcodeNumber;
			}

			function onScanError(errorMessage) {
				if (
					!/No MultiFormat Readers were able to detect the code/.test(
						errorMessage,
					)
				) {
					console.warn(errorMessage);
				}
			}

			document.addEventListener('DOMContentLoaded', () => {
				startScanner().catch((err) => {
					console.error(err);
					barcodeValueEl.textContent = 'Ошибка запуска камеры';
					disableZoom('нет зума');
				});
			});
		</script>
	</body>
</html>
